<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencatat Pemasukan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-5">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-700">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">📝 Catat Pemasukan</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm mb-1">Nama Barang</label>
                <input type="text" id="nama" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:border-blue-500 outline-none" placeholder="Contoh: Topup ML 86 DM">
            </div>
            
            <div>
                <label class="block text-sm mb-1">Harga (Nominal)</label>
                <input type="number" id="harga" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:border-blue-500 outline-none" placeholder="20000">
            </div>

            <button onclick="kirimData()" id="btnSimpan" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-bold transition duration-300">
                Simpan ke Drive
            </button>
        </div>
    </div>

    <script>
        async function kirimData() {
            const btn = document.getElementById('btnSimpan');
            const data = {
                nama: document.getElementById('nama').value,
                harga: document.getElementById('harga').value
            };

            if(!data.nama || !data.harga) return alert("Isi dulu bro!");

            btn.disabled = true;
            btn.innerText = "Mengirim...";

            // GANTI URL DI BAWAH INI DENGAN URL DARI GOOGLE SCRIPT TADI
            const scriptURL = "PASTE_URL_WEB_APP_KAMU_DISINI";

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify(data),
                    mode: 'no-cors'
                });
                alert("✅ Data Berhasil Masuk!");
                document.getElementById('nama').value = "";
                document.getElementById('harga').value = "";
            } catch (error) {
                alert("❌ Gagal mengirim!");
            } finally {
                btn.disabled = false;
                btn.innerText = "Simpan ke Drive";
            }
        }
    </script>
</body>
</html>
